# Profile used by the compose `backend` service. Points at the Postgres
# and Redis hostnames that compose registers; turns off Spring Boot's
# docker-compose integration (we're inside a container already, the
# orchestration is the compose runtime that started us).

spring:
  docker:
    compose:
      enabled: false

  datasource:
    # POSTGRES_* env vars are set by docker compose (which reads .env or
    # falls back to the throwaway dev defaults). The same values feed both
    # this datasource and the postgres service so they stay in sync.
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:yaya_agentic}
    username: ${POSTGRES_USER:yaya}
    password: ${POSTGRES_PASSWORD:yaya}
    hikari:
      maximum-pool-size: 10

  data:
    redis:
      host: redis
      port: 6379

yaya:
  agentic:
    cors:
      # Comma-separated list of allowed origins (patterns supported — see
      # CorsConfiguration.setAllowedOriginPatterns in CoreConfiguration).
      # Default covers compose-on-host-3000 and flutter run -d chrome.
      # Add the public SPA origin(s) via env var in each deployment's .env,
      # e.g. YAYA_AGENTIC_CORS_ALLOWED_ORIGINS=http://localhost:*,https://admin.example.com
      allowed-origins: ${YAYA_AGENTIC_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
