name: yayaagenticweb
description: "Admin console + test playground for yaya-agentic."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0

  # Networking + SSE
  dio: ^5.7.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Persistence
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
