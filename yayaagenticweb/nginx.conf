server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unmatched path serves index.html so go_router can
    # take over client-side. Static asset 404s still bubble up.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bypass aggressive defaults for the entry point; let Flutter's own
    # service worker handle long-lived caching of hashed assets.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Long cache for hashed CanvasKit / dart-out assets — they're filename-
    # versioned, so we can be aggressive.
    location ~* \.(?:js|css|woff2?|ttf|wasm|png|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Tiny health endpoint for the compose healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
