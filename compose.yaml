# Local dev only. Spring Boot's docker-compose integration starts this on
# `mvn spring-boot:run` and registers the service connection automatically.
# CI uses Testcontainers (see src/test/.../TestcontainersConfiguration).
services:

  postgres:
    image: pgvector/pgvector:pg16
    # Spring Boot's docker-compose auto-detection keys off the image name;
    # pgvector/pgvector isn't on the recognized list, so we tell it
    # explicitly that this is a Postgres service.
    labels:
      org.springframework.boot.service-connection: postgres
    environment:
      POSTGRES_DB: yaya_agentic
      POSTGRES_USER: yaya
      POSTGRES_PASSWORD: yaya
    ports:
      # 5433 on host so a system Postgres on 5432 doesn't clash.
      # Spring Boot's compose integration auto-detects the actual port.
      - "5433:5432"
    volumes:
      - yaya_pg_data:/var/lib/postgresql/data

volumes:
  yaya_pg_data:
